<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous" />
  <style>
    /* id, classe, marcatori */
    .alert {
      margin-bottom: 0px;
    }
  </style>
</head>

<body>
  <main>
    <section id="cambiaColore">
      <div class="alert alert-success" role="alert">Ciao</div>
      <div class="alert alert-success" role="alert">Ciao</div>
    </section>

    </div>

    <template id="cardTemplate">
      <div class="card col-4">
        <img src="https://picsum.photos/seed/picsum/200/300" class="card-img-top" alt="..." />
        <div class="card-body">
          <h5 class="card-title">Card title</h5>
          <p class="card-text">
            Some quick example text to build on the card title and make up the
            bulk of the card's content.
          </p>
          <a href="#" class="btn btn-primary">Go somewhere</a>
        </div>
      </div>
    </template>

    <section id="ciao">
      <div class="container-fluid">
        <div class="row" id="contenitoreDiCards">

        </div>
      </div>
    </section>

  </main>

  <footer></footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
    crossorigin="anonymous"></script>
  
  <script>
    
    const divs = document.getElementsByTagName("div");

    function cambiaColore(colore) {
      for (let i = 0; i < divs.length; i++) {
        if (divs[i].parentElement.id === "cambiaColore") {
          divs[i].style.backgroundColor = colore;
        }
      }
    }

    let col = 1;

    const inter = setInterval(() => {
      if (col <= 0) {
        clearInterval(inter);
        console.log("finito");
      }

      cambiaColore(`rgba(255,0,0,${col})`);
      col = col - 0.1;

    }, 400);
  </script>

  <script>
    const templete = document.getElementById("cardTemplate").content;
    const dest = document.getElementById("ciao").getElementsByClassName("row")[0];
    let i = 0;

    function CreaCard() {
      const k = Math.floor(Math.random() * 1000);
      const clone = templete.cloneNode(true);
      clone.querySelector("img").src = `https://picsum.photos/seed/${k}/200/300`;
      dest.appendChild(clone);
      i++;
      if (i < 30) {
        setTimeout(CreaCard, 100);
      }
      else {
        cambiaImg();
      }
    }

    function cambiaImg() {
      const img = dest.querySelectorAll("img");
      if (i == img.length) {
        i = 0;
      }
      const k = Math.floor(Math.random() * 1000);
      img[i].src = `https://picsum.photos/seed/${k}/200/300`;
      i++;
      setTimeout(cambiaImg, 100);
    }

    CreaCard();

  </script>
</body>

</html>
