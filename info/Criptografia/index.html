<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous" />
</head>

<body class="vh-100 d-flex flex-column">
  <header>
    <nav class="navbar navbar-light bg-light">
      <div class="container-fluid">
        <!-- PARTE DI CRIPTO CESARE -->
        <div class="col-4">
          <div class="row">
            <div class="form-floating col-6">
              <input type="number" class="form-control" id="KeyCesare" placeholder="Key" value="3" />
              <label style="left: 0.5em" for="KeyCesare">Key</label>

            </div>

            <div class="form-check form-switch d-flex flex-column align-items-center text-center col-6 w-auto p-0">
              <label class="form-check-label mb-2" for="flexSwitchCheckDefault">
                Cesare
              </label>
              <input class="form-check-input ms-0" type="checkbox" id="CheckCesare" />
            </div>
          </div>
        </div>

        <!-- PARTE DI Vigenére-->
        <div class="col-4">
          <div class="row">
            <div class="form-floating col-6">
              <input type="text" class="form-control" id="KeyVigenere" placeholder="Chiave" value="Chiave" />
              <label style="left: 0.5em" for="KeyVigenere">Key</label>
            </div>

            <div class="form-check form-switch d-flex flex-column align-items-center text-center col-6 w-auto p-0">
              <label class="form-check-label mb-2" for="CheckVigenere">
                Vigenére
              </label>
              <input class="form-check-input ms-0" type="checkbox" id="CheckVigenere" />
            </div>
          </div>
        </div>

        <!-- PARTE DI Vigenére-->
        <div class="col-4">
          <div class="row">
            <div class="form-floating col-6">
              <select class="form-select" id="floatingSelect" aria-label="Floating label select example">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3" selected>3</option>
              </select>
              <label style="left: 0.5em" for="floatingSelect">Key</label>
            </div>

            <div class="form-check form-switch d-flex flex-column align-items-center text-center col-6 w-auto p-0">
              <label class="form-check-label mb-2" for="flexSwitchCheckDefault">
                Cesare
              </label>
              <input class="form-check-input ms-0" type="checkbox" id="flexSwitchCheckDefault" />
            </div>
          </div>
        </div>
      </div>

      <div class="container-fluid">
        <!-- Cesare -->
        <div class="col-4">
          <div id="Slots">
          <h1></h1>
        </div>
        </div>
        <!-- Vigenére -->
        <div class="col-4">

        </div>
        <!-- MonoAfabetico -->
        <div class="col-4">

        </div>


        

        <template>
          <div class="slot">
          </div>
        </template>


    </nav>
  </header>
  <main class="flex-grow-1 d-flex flex-column overflow-hidden">
    <div class="row g-0 h-100">
      <div class="col-5 bg-success rounded-start d-flex flex-column" style="height: 100%">
        <div class="rounded-4 bg-primary" id="Box1" style="height: 90%"></div>

        <div class="bg-info" style="height: 10%">
          <div class="input-group mb-3 h-100">
            <input type="text" class="form-control rounded-pill rounded-end" placeholder="Inserisci il testo"
              aria-label="Text input" id="TextUte-1" />
            <button data-mittente="TextUte-1" class="btn btn-outline-secondary rounded-pill rounded-start" type="button"
              onclick="Cripto(this, 'Box1', 'Box2')">
              Button
            </button>
          </div>
        </div>
      </div>

      <div class="col-2 bg-secondary d-flex align-items-center justify-content-center" id="BoxCripto"></div>

      <div class="col-5 bg-success rounded-start d-flex flex-column" style="height: 100%">
        <div class="rounded-4 bg-danger" id="Box2" style="height: 90%"></div>

        <div class="bg-info" style="height: 10%">
          <div class="input-group mb-3 h-100">
            <input type="text" class="form-control rounded-pill rounded-end" placeholder="Inserisci il testo"
              aria-label="Text input" id="TextUte-2" />
            <button data-mittente="TextUte-2" class="btn btn-outline-secondary rounded-pill rounded-start" type="button"
              onclick="Cripto(this, 'Box2', 'Box1')">
              Button
            </button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="bg-dark text-white p-2 text-center">
    <small>Creato con amore per la crittografia © 2024</small>
  </footer>
</body>
<script src="index.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
  integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>

</html>
